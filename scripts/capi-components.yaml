# harvester-ops — CAPI / CAPHV stack components inventory.
#
# Versions PINNED so the airgap bundle is deterministic.
# Edit this file to bump versions, then run `scripts/bundle-capi.sh`
# to refresh the offline bundle.

# Bundle-level metadata — copied verbatim into the bundle's manifest.json
# under `bundle.*`. Bumped here when supported Harvester versions change.
bundle_metadata:
  # Glob list: each entry is matched against the target cluster's
  # `setting/server-version` value (e.g. "v1.8.0"). Supports MAJOR.MINOR.x.
  # The install endpoint refuses to proceed if the target Harvester
  # version doesn't satisfy any of these globs (override with force=1).
  compatible_harvester_versions:
    - "v1.7.x"
    - "v1.8.x"
  # Free-form notes shown in the bundle inspect overlay
  notes: |
    Built against Harvester v1.7.x / v1.8.x (K8s v1.31, RKE2 v1.31).
    Bundle pins the CAPI stack to versions known to work on these
    Harvester releases. Other Harvester majors are likely to require
    a different CAPHV / cabp-rke2 / cacp-rke2 combination.
#
# Components are deployed in this order on the target Harvester cluster:
#   1. cert-manager      (CAPI prerequisite, often already installed)
#   2. cluster-api-core  (CRDs + capi-controller-manager)
#   3. cabp-rke2         (RKE2 bootstrap provider)
#   4. cacp-rke2         (RKE2 control-plane provider)
#   5. caphv             (Harvester infrastructure provider)
#   6. caphv-clusterclass (the ClusterClass that ties it all together)

cluster-api:
  version: v1.10.4
  manifests:
    - name: core
      url: https://github.com/kubernetes-sigs/cluster-api/releases/download/v1.10.4/cluster-api-components.yaml
  images:
    - registry.k8s.io/cluster-api/cluster-api-controller:v1.10.4
    - registry.k8s.io/cluster-api/kubeadm-bootstrap-controller:v1.10.4   # not used but pulled to be safe
    - registry.k8s.io/cluster-api/kubeadm-control-plane-controller:v1.10.4

cabp-rke2:
  version: v0.16.1
  manifests:
    - name: bootstrap-components
      url: https://github.com/rancher/cluster-api-provider-rke2/releases/download/v0.16.1/bootstrap-components.yaml
  images:
    - ghcr.io/rancher/cluster-api-provider-rke2-bootstrap:v0.16.1

cacp-rke2:
  version: v0.16.1
  manifests:
    - name: control-plane-components
      url: https://github.com/rancher/cluster-api-provider-rke2/releases/download/v0.16.1/control-plane-components.yaml
  images:
    - ghcr.io/rancher/cluster-api-provider-rke2-controlplane:v0.16.1

caphv:
  version: v0.2.8
  manifests:
    - name: infrastructure-components
      url: https://github.com/rancher-sandbox/cluster-api-provider-harvester/releases/download/v0.2.8/infrastructure-components.yaml
  images:
    - ghcr.io/rancher-sandbox/cluster-api-provider-harvester:v0.2.8

cert-manager:
  version: v1.16.2
  manifests:
    - name: cert-manager
      url: https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
  images:
    - quay.io/jetstack/cert-manager-controller:v1.16.2
    - quay.io/jetstack/cert-manager-webhook:v1.16.2
    - quay.io/jetstack/cert-manager-cainjector:v1.16.2

# ClusterClass + cluster templates (ships with the bundle, no images/pull)
# Version tracks CAPHV — these YAMLs are designed against that release.
caphv-clusterclass:
  version: v0.2.8
  description: |
    harvester-rke2 ClusterClass + RKE2 cluster template (kubectl apply -f).
    Source: CAPHV repo, templates/clusterclass/rke2/*.yaml.
