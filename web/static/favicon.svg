<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background disk for dark/light theme contrast -->
  <circle cx="32" cy="32" r="32" fill="#0c1410"/>

  <!-- Antenna tip + signal blip -->
  <circle cx="32" cy="6" r="2.5" fill="#30ba78"/>
  <line x1="32" y1="8" x2="32" y2="13" stroke="#30ba78" stroke-width="2" stroke-linecap="round"/>

  <!-- Observation cabin (wide top with overhanging eaves) -->
  <path d="M13 13 L51 13 L47 22 L17 22 Z" fill="#30ba78"/>

  <!-- Cabin windows (4 panes) -->
  <rect x="20" y="15.5" width="4" height="4" fill="#0c1410"/>
  <rect x="26" y="15.5" width="4" height="4" fill="#0c1410"/>
  <rect x="34" y="15.5" width="4" height="4" fill="#0c1410"/>
  <rect x="40" y="15.5" width="4" height="4" fill="#0c1410"/>

  <!-- Mast / pole -->
  <rect x="26" y="22" width="12" height="28" fill="#30ba78"/>

  <!-- Door on mast -->
  <rect x="29.5" y="38" width="5" height="9" rx="1" fill="#0c1410"/>

  <!-- Base platforms -->
  <rect x="14" y="50" width="36" height="6" rx="1.5" fill="#30ba78"/>
  <rect x="9"  y="55" width="46" height="4" rx="1" fill="#30ba78"/>

  <!-- Radar pulse arcs (decorative — signals 'control') -->
  <path d="M 8 11 Q 14 6, 22 8" stroke="#30ba78" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 56 11 Q 50 6, 42 8" stroke="#30ba78" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
